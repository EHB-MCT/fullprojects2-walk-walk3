<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://use.typekit.net/gpf2sus.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Walk Brussels</title>
  </head>
  <body>
    <nav>
      <a href="https://www.walk.brussels/nl/genoeg-van-de-troep" id="backArrow"
        ><img src="../images/Arrow.png" alt="arrow"
      /></a>
      <a href="../index.html" id="Logo"
        ><img src="../images/logo.avif" alt="arrow"
      /></a>
      <label class="taalKnop">
        <input type="checkbox" id="taalToggle" />
        <span class="slider"></span>
        <span class="taal-nl">nl</span>
        <span class="taal-fr">fr</span>
      </label>
    </nav>
    <img
      src="../images/StappenNav3.png"
      alt="page navigation"
      class="PageNav"
    />
    <section class="locatieGegevens">
      <h1>Uw gegevens</h1>
      <input type="text" placeholder="Naam" id="inputNaam" />
      <input type="text" placeholder="Voornaam" id="inputVoornaam" />
      <input type="email" placeholder="E-mail" id="inputMail" />
    </section>

    <section class="checkbox-group">
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span class="checkmark"></span>
        <p>
          Ik stem ermee in dat Walk.Brussels mijn gegevens opslaat in hun
          database.
          <small>
            Raadpleeg onze
            <a href="https://www.walk.brussels/nl/privacy-fr"
              >privacyverklaring</a
            >
            ter bescherming van uw persoonlijke gegevens.
          </small>
        </p>
      </label>
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span class="checkmark"></span>
        <p>
          Ik stem ermee in om de nieuwsbrief van Walk.Brussels te ontvangen.
        </p>
      </label>
    </section>

    <footer>
      <a class="Vorige" href="welkObstakel.html">Vorige</a>
      <a class="Volgende" id="Indienen" href="verzonden.html">Indienen</a>
    </footer>
    <script src="../javascript/Javascript.js"></script>
  </body>
</html>
