<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vul uw gegevens in om de melding te versturen naar Walk Brussels."
    />
    <link rel="icon" type="image/png" href="../images/Favicon.png" />
    <link rel="stylesheet" href="https://use.typekit.net/gpf2sus.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Uw Gegevens | Walk Brussels</title>
  </head>
  <body>
    <nav>
      <span id="backArrow"></span>
      <a href="../index.html" id="logo"
        ><img src="../images/logo.avif" alt="Walk Brussels logo"
      /></a>
      <label class="language-toggle">
        <input type="checkbox" id="languageToggle" />
        <span class="language-slider"></span>
        <span class="language-nl">nl</span>
        <span class="language-fr">fr</span>
      </label>
      <img
        src="../images/StappenNav3.png"
        alt="Stap 3 van 3"
        class="step-nav"
      />
    </nav>

    <section class="user-details">
      <h1 class="page-title">Uw gegevens</h1>
      <input type="text" placeholder="Naam" id="inputNaam" />
      <input type="text" placeholder="Voornaam" id="inputVoornaam" />
      <input type="email" placeholder="E-mail" id="inputMail" />
    </section>

    <section class="checkbox-group">
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span class="checkmark"></span>
        <p class="checkbox-text">
          Ik stem ermee in dat Walk.Brussels mijn gegevens opslaat in hun
          database.<br />
          <small>
            Raadpleeg onze
            <a href="https://www.walk.brussels/nl/privacy-fr"
              >privacyverklaring</a
            >
            ter bescherming van uw persoonlijke gegevens.
          </small>
        </p>
      </label>
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span class="checkmark"></span>
        <p class="checkbox-text">
          Ik stem ermee in om de nieuwsbrief van Walk.Brussels te ontvangen.
        </p>
      </label>
      <span class="details-divider"></span>
      <button class="Anoniem-Button" id="anonymButton">Blijf anoniem</button>
    </section>

    <footer>
      <a class="btn-prev" href="welkObstakel.html">Vorige</a>
      <a class="btn-next" id="submit-button" href="verzonden.html">Indienen</a>
    </footer>
    <script src="../javascript/Javascript.js"></script>
  </body>
</html>
