<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Veuillez remplir vos coordonnées afin d'envoyer le signalement à Walk Brussels."
    />
    <link rel="icon" type="image/png" href="../images/Favicon.png" />
    <link rel="stylesheet" href="https://use.typekit.net/gpf2sus.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Vos coordonnées | Walk Brussels</title>
  </head>
  <body>
    <nav>
      <span id="backArrow"></span>
      <a href="../index.html" id="logo"
        ><img src="../images/logo.avif" alt="Walk Brussels logo"
      /></a>
      <label class="language-toggle">
        <input type="checkbox" id="languageToggle" />
        <span class="language-slider"></span>
        <span class="language-nl">nl</span>
        <span class="language-fr">fr</span>
      </label>
      <img
        src="../images/StappenNav3.png"
        alt="Stap 3 van 3"
        class="step-nav"
      />
    </nav>

    <section class="user-details">
      <h1 class="page-title">Vos coordonnées</h1>
      <input type="text" placeholder="Nom" id="inputNaam" />
      <input type="text" placeholder="Prénom" id="inputVoornaam" />
      <input type="email" placeholder="E-mail" id="inputMail" />
    </section>

    <section class="checkbox-group">
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span class="checkmark"></span>
        <p class="checkbox-text">
          J'accepte que Walk.Brussels conserve mes données dans sa base de
          données.<br />
          <small>
            Consultez notre
            <a href="https://www.walk.brussels/nl/privacy-fr"
              >politique de confidentialité</a
            >
            afin de protéger vos données personnelles
          </small>
        </p>
      </label>
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span class="checkmark"></span>
        <p class="checkbox-text">
          J'accepte de recevoir la newsletter de Walk.Brussels.
        </p>
      </label>
      <span class="details-divider"></span>
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span class="checkmark"></span>
        <p class="checkbox-text">
          Vous préférez ne pas partager vos données ? Cochez cette option pour
          rester <b>anoniem</b> (Vos données ne seront pas conservées.) »
        </p>
      </label>
    </section>

    <footer>
      <a class="btn-prev" href="welkObstakelFR.html">Précédent</a>
      <a class="btn-next" id="submit-button" href="verzondenFR.html">Envoyer</a>
    </footer>
    <script src="../javascript/Javascript.js"></script>
  </body>
</html>
