<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://use.typekit.net/gpf2sus.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Walk Brussels</title>
  </head>
  <body>
    <img src="images/Deco1.png" alt="" class="deco" />
    <nav>
      <a href="https://www.walk.brussels/nl/genoeg-van-de-troep" id="backArrow"
        ><img src="images/Arrow.png" alt="arrow"
      /></a>
      <a href="index.html" id="Logo"
        ><img src="images/logo.avif" alt="arrow"
      /></a>
      <label class="taalKnop">
        <input type="checkbox" id="taalToggle" />
        <span class="slider"></span>
        <span class="taal-nl">nl</span>
        <span class="taal-fr">fr</span>
      </label>
      <img src="images/StappenNav1.png" alt="page navigation" class="PageNav" />
    </nav>

    <header id="headerIndex">
      <h1 id="HomeExtraTitel">Genoeg <br />van de <br /><b>troep</b></h1>
    </header>
    <section class="locatieObject objectMobile">
      <span class="breakLine"></span>
      <h1>Waar is het obstakel<b>?</b></h1>
      <input type="text" placeholder="Straat" id="inputStraat" />
      <input type="text" placeholder="Gemeente" id="inputGemeente" />
      <input type="text" placeholder="Postcode" id="inputPostcode" />
      <iframe
        id="kaartMobile"
        src="https://maps.google.com/maps?q=Brussel&output=embed"
        allowfullscreen
        loading="lazy"
      ></iframe>
      <section class="locationButtons">
        <button class="deelLocatieButton">Deel je locatie</button>
      </section>
    </section>
    <section class="locatieObject objectDesktop">
      <section>
        <span class="breakLine"></span>
      </section>
      <section>
        <h1>Waar is het obstakel<b>?</b></h1>
        <input type="text" placeholder="Straat" id="inputStraatDesktop" />
        <input type="text" placeholder="Gemeente" id="inputGemeenteDesktop" />
        <input type="text" placeholder="Postcode" id="inputPostcodeDesktop" />
        <iframe
          id="kaartDesktop"
          src="https://maps.google.com/maps?q=Brussel&output=embed"
          allowfullscreen
          loading="lazy"
        ></iframe>
        <section class="locationButtons">
          <button class="deelLocatieButton">Deel je locatie</button>
        </section>
      </section>
    </section>
    <footer>
      <a class="Volgende" href="paginas/welkObstakel.html">Volgende</a>
    </footer>
    <script src="javascript/Javascript.js"></script>
  </body>
</html>
